spring:
  main:
    web-application-type: none
    banner-mode: off
  mail:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  model: ${OPENAI_MODEL:gpt-5.4-mini}
  reasoning-effort: ${OPENAI_REASONING_EFFORT:none}
  verbosity: ${OPENAI_VERBOSITY:low}
  max-output-tokens: ${OPENAI_MAX_OUTPUT_TOKENS:4000}
  timeout: ${OPENAI_TIMEOUT:60s}

report:
  top-n: ${REPORT_TOP_N:3}
  dry-run: ${REPORT_DRY_RUN:true}
  channel: ${REPORT_CHANNEL:EMAIL}
  zone-id: ${REPORT_ZONE_ID:Asia/Seoul}
  duplicate-title-similarity-threshold: ${REPORT_DUPLICATE_TITLE_SIMILARITY_THRESHOLD:0.82}
  lookback-hours: ${REPORT_LOOKBACK_HOURS:120}
  max-entries-per-source: ${REPORT_MAX_ENTRIES_PER_SOURCE:20}
  max-articles-per-source: ${REPORT_MAX_ARTICLES_PER_SOURCE:2}
  runner:
    enabled: ${REPORT_RUNNER_ENABLED:true}
  scoring:
    recency-weight: ${REPORT_RECENCY_WEIGHT:0.30}
    keyword-weight: ${REPORT_KEYWORD_WEIGHT:0.15}
    source-reliability-weight: ${REPORT_SOURCE_RELIABILITY_WEIGHT:0.20}
    repetition-weight: ${REPORT_REPETITION_WEIGHT:0.35}

notification:
  email:
    to: ${EMAIL_TO:}
    from: ${EMAIL_FROM:}
    subject-prefix: ${EMAIL_SUBJECT_PREFIX:[Daily Report]}
  slack:
    webhook-url: ${SLACK_WEBHOOK_URL:}

feeds:
